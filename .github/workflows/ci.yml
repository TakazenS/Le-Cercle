name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/le_cercle_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: le_cercle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Rust Install
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo Cache
        uses: Swatinem/rust-cache@v2

      - name: Sqlx-cli Install
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli

      - name: Compiler (server & shared)
        run: cargo build -p server -p shared --verbose

      - name: Apply Migrations
        working-directory: crates/server
        run: sqlx migrate run

      - name: Launch Tests
        run: |
          ./target/debug/server &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/ > /dev/null; then
              echo "Le serveur répond."
              kill $SERVER_PID
              exit 0
            fi
            sleep 1
          done
          echo "Le serveur n'a pas répondu à temps."
          kill $SERVER_PID
          exit 1

  frontend:
    name: Frontend (React/TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node Install
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile Frontend
        run: npm run build
